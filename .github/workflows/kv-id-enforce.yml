name: Enforce KV namespace ID

on:
  push:
    paths:
      - 'wrangler.jsonc'
  pull_request:
    paths:
      - 'wrangler.jsonc'

jobs:
  check-kv-id:
    name: Check wrangler.jsonc KV namespace ID
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run KV ID check
        run: node .github/scripts/check-kv-id.js
